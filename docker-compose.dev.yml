services:
  bot:
    build:
      context: ./ProductTrackerBot
      dockerfile: Dockerfile
    env_file:
      - ./.env.dev
    environment:
      - DB_PATH=/data/product-tracker.db
    volumes:
      - db-data-dev:/data
    restart: unless-stopped
    networks:
      - internal-dev

  web:
    build:
      context: .
      dockerfile: ProductTrackerBot.Web/Dockerfile
    env_file:
      - ./.env.dev
    environment:
      - DB_PATH=/data/product-tracker.db
      - ASPNETCORE_URLS=http://+:8081
      - WEB_SESSION_TTL_HOURS=24
      - BOT_USERNAME=@FamilyInventoryDevBot
    volumes:
      - db-data-dev:/data
    restart: unless-stopped
    networks:
      - internal-dev

  nginx:
    image: nginx:alpine
    entrypoint: ["/custom-entrypoint.sh"]
    command: ["nginx", "-g", "daemon off;"]
    env_file:
      - ./.env.dev
    ports:
      - "8080:80"
    volumes:
      - ./html-landing:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/docker-entrypoint.sh:/custom-entrypoint.sh:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - internal-dev

volumes:
  db-data-dev:

networks:
  internal-dev:
    driver: bridge
