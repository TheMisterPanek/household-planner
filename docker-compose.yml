services:
  bot:
    build:
      context: ./ProductTrackerBot
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - DB_PATH=/data/product-tracker.db
    volumes:
      - db-data:/data
    restart: unless-stopped
    networks:
      - internal

  backup:
    build:
      context: ./backup
    env_file:
      - ./.env
    volumes:
      - db-data:/data:ro
      - ./backups:/backups
    restart: unless-stopped
    networks:
      - internal

volumes:
  db-data:

networks:
  internal:
    driver: bridge
