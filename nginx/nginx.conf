events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Docker internal DNS — resolve "web" at request time so nginx
    # starts even when the web container is not running.
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name _;

        # Landing page (static)
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "max-age=86400";
        }

        # Blazor web app
        location /app {
            set $web_upstream http://web:8080;
            proxy_pass         $web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # WebSocket support for Blazor Server
        location /app/_blazor {
            set $web_upstream http://web:8080;
            proxy_pass         $web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host $host;
        }
    }
}

